<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financial Intelligence Agent</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3e;
    --accent: #7c6cff;
    --accent2: #00d4aa;
    --accent3: #ff6b6b;
    --text: #e8e8f0;
    --text-dim: #7a7a9a;
    --glow: rgba(124, 108, 255, 0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,108,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,108,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px 24px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 48px;
    gap: 24px;
    flex-wrap: wrap;
  }

  .logo-block h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1;
    color: #fff;
  }

  .logo-block h1 span {
    color: var(--accent);
  }

  .logo-block p {
    margin-top: 8px;
    color: var(--text-dim);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .badge {
    background: linear-gradient(135deg, var(--accent), #4a3fcc);
    color: #fff;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 2px;
    font-weight: 700;
    margin-top: 10px;
    display: inline-block;
  }

  /* Input Section */
  .input-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 28px 32px;
    margin-bottom: 32px;
    position: relative;
    overflow: hidden;
  }

  .input-section::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  .input-label {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 14px;
  }

  .input-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .input-wrapper {
    flex: 1;
    min-width: 200px;
    position: relative;
  }

  .input-wrapper::before {
    content: '//';
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--accent);
    font-size: 13px;
    font-weight: 700;
  }

  input[type="text"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    padding: 14px 14px 14px 40px;
    border-radius: 3px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input[type="text"]::placeholder { color: var(--text-dim); }

  input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--glow);
  }

  .run-btn {
    background: linear-gradient(135deg, var(--accent), #4a3fcc);
    color: #fff;
    border: none;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 14px 32px;
    border-radius: 3px;
    cursor: pointer;
    white-space: nowrap;
    transition: transform 0.15s, box-shadow 0.15s;
    text-transform: uppercase;
  }

  .run-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 24px rgba(124,108,255,0.4);
  }

  .run-btn:active { transform: translateY(0); }

  .run-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  /* Hint */
  .hint {
    margin-top: 12px;
    font-size: 11px;
    color: var(--text-dim);
  }

  .hint span { color: var(--accent2); }

  /* Status */
  #status-bar {
    display: none;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    padding: 14px 20px;
    border-radius: 3px;
    margin-bottom: 24px;
    font-size: 12px;
    color: var(--text-dim);
    animation: pulse-border 1.5s ease-in-out infinite;
  }

  @keyframes pulse-border {
    0%, 100% { border-left-color: var(--accent); }
    50% { border-left-color: var(--accent2); }
  }

  #status-bar .status-dot {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--accent2);
    border-radius: 50%;
    margin-right: 10px;
    animation: blink 1s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  /* Error */
  #error-box {
    display: none;
    background: rgba(255, 107, 107, 0.08);
    border: 1px solid rgba(255, 107, 107, 0.3);
    border-left: 3px solid var(--accent3);
    padding: 14px 20px;
    border-radius: 3px;
    margin-bottom: 24px;
    font-size: 12px;
    color: var(--accent3);
  }

  /* Results */
  #results {
    display: flex;
    flex-direction: column;
    gap: 32px;
  }

  .company-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    animation: fadeSlideUp 0.4s ease forwards;
    opacity: 0;
  }

  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    padding: 20px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    flex-wrap: wrap;
    gap: 12px;
  }

  .card-header h2 {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: #fff;
  }

  .card-header h2 .ticker {
    color: var(--accent);
    font-size: 13px;
    font-weight: 600;
    margin-left: 8px;
  }

  .meta-pills {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .pill {
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 2px;
    border: 1px solid var(--border);
    color: var(--text-dim);
  }

  .pill.green { border-color: rgba(0,212,170,0.4); color: var(--accent2); }
  .pill.red { border-color: rgba(255,107,107,0.4); color: var(--accent3); }
  .pill.purple { border-color: rgba(124,108,255,0.4); color: var(--accent); }

  .chart-area {
    padding: 28px;
    position: relative;
    height: 320px;
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 1px;
    background: var(--border);
    border-top: 1px solid var(--border);
  }

  .stat-cell {
    background: var(--surface);
    padding: 16px 20px;
  }

  .stat-cell .label {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  .stat-cell .value {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: #fff;
  }

  .stat-cell .value.up { color: var(--accent2); }
  .stat-cell .value.down { color: var(--accent3); }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 80px 24px;
    color: var(--text-dim);
  }

  .empty-state .icon {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0.3;
  }

  .empty-state h3 {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--text);
    opacity: 0.4;
  }

  .empty-state p {
    font-size: 12px;
    max-width: 300px;
    margin: 0 auto;
    line-height: 1.6;
  }

  /* Loading skeleton */
  .skeleton-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    animation: fadeSlideUp 0.3s ease forwards;
  }

  .skeleton-header {
    padding: 20px 28px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .skel {
    background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 2px;
  }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* Responsive */
  @media (max-width: 600px) {
    .input-row { flex-direction: column; }
    .run-btn { width: 100%; }
    .chart-area { height: 250px; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo-block">
      <h1>FIN<span>SCOPE</span></h1>
      <p>Financial Intelligence Agent</p>
      <div class="badge">Powered by Claude AI</div>
    </div>
  </header>

  <div class="input-section">
    <div class="input-label">// Target Companies</div>
    <div class="input-row">
      <div class="input-wrapper">
        <input type="text" id="company-input" placeholder="Apple, Samsung, TSMC, Nvidia ..."
          onkeydown="if(event.key==='Enter') runAgent()">
      </div>
      <button class="run-btn" id="run-btn" onclick="runAgent()">
        ▶ Analyze
      </button>
    </div>
    <div class="hint">
      쉼표로 구분해 복수 입력 가능 &nbsp;|&nbsp; 예: <span>Apple, Microsoft, Google</span>
      &nbsp;|&nbsp; <span>삼성전자, SK하이닉스</span>
    </div>
  </div>

  <div id="status-bar">
    <span class="status-dot"></span>
    <span id="status-text">AI Agent 분석 중...</span>
  </div>

  <div id="error-box"></div>

  <div id="results">
    <div class="empty-state">
      <div class="icon">◈</div>
      <h3>No Data Loaded</h3>
      <p>회사명을 입력하고 Analyze를 눌러 최근 5년 재무 현황을 확인하세요.</p>
    </div>
  </div>

</div>

<script>
const COLORS = [
  { bar: 'rgba(124,108,255,0.6)', barDark: 'rgba(124,108,255,0.9)', line: '#7c6cff' },
  { bar: 'rgba(0,212,170,0.6)',   barDark: 'rgba(0,212,170,0.9)',   line: '#00d4aa' },
  { bar: 'rgba(255,107,107,0.6)', barDark: 'rgba(255,107,107,0.9)', line: '#ff6b6b' },
  { bar: 'rgba(255,187,51,0.6)',  barDark: 'rgba(255,187,51,0.9)',  line: '#ffbb33' },
  { bar: 'rgba(100,200,255,0.6)', barDark: 'rgba(100,200,255,0.9)', line: '#64c8ff' },
];

let charts = {};

function setStatus(msg, show=true) {
  const bar = document.getElementById('status-bar');
  document.getElementById('status-text').textContent = msg;
  bar.style.display = show ? 'block' : 'none';
}

function setError(msg) {
  const box = document.getElementById('error-box');
  box.textContent = '⚠ ' + msg;
  box.style.display = msg ? 'block' : 'none';
}

async function runAgent() {
  const raw = document.getElementById('company-input').value.trim();
  if (!raw) return;

  const companies = raw.split(/[,，、\n]+/).map(s => s.trim()).filter(Boolean);
  if (companies.length === 0) return;

  const btn = document.getElementById('run-btn');
  btn.disabled = true;
  setError('');
  setStatus(`${companies.length}개 기업 재무 데이터 수집 중...`);

  // Destroy old charts
  Object.values(charts).forEach(c => c.destroy());
  charts = {};

  const resultsEl = document.getElementById('results');
  resultsEl.innerHTML = '';

  // Show skeletons
  companies.forEach((_, i) => {
    resultsEl.innerHTML += `
      <div class="skeleton-card" id="skel-${i}">
        <div class="skeleton-header">
          <div class="skel" style="width:180px;height:22px"></div>
          <div class="skel" style="width:70px;height:18px"></div>
        </div>
        <div style="padding:28px">
          <div class="skel" style="width:100%;height:260px"></div>
        </div>
      </div>`;
  });

  // Build prompt
  const prompt = `You are a financial data analyst. For each of the following companies, provide their key financial metrics for fiscal years 2020, 2021, 2022, 2023, and 2024.

Companies: ${companies.join(', ')}

Return ONLY a valid JSON array (no markdown, no explanation) in this exact format:
[
  {
    "company": "Company Name",
    "ticker": "TICKER",
    "sector": "Sector",
    "currency": "USD",
    "years": [2020, 2021, 2022, 2023, 2024],
    "revenue": [number_in_billions, ...],
    "operating_income": [number_in_billions, ...],
    "operating_margin": [percentage_number, ...],
    "net_income": [number_in_billions, ...],
    "note": "brief note about data source or accuracy"
  }
]

Rules:
- All monetary values must be in billions (e.g., 100 = $100B)
- operating_margin is a percentage (e.g., 25.5 = 25.5%)
- Use best available data or reasonable estimates if exact figures are unavailable
- For Korean companies (삼성전자, SK하이닉스 etc.), convert to USD billions or use KRW trillions with currency field set to "KRW"
- If a year's data is unavailable, use null
- Return ONLY the JSON array, nothing else`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 4000,
        tools: [{ type: "web_search_20250305", name: "web_search" }],
        messages: [{ role: "user", content: prompt }]
      })
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || `HTTP ${response.status}`);
    }

    const data = await response.json();

    // Extract text from response (may include tool_use blocks)
    const textBlocks = data.content.filter(b => b.type === 'text');
    const fullText = textBlocks.map(b => b.text).join('');

    // Parse JSON
    let jsonStr = fullText;
    const jsonMatch = fullText.match(/\[[\s\S]*\]/);
    if (jsonMatch) jsonStr = jsonMatch[0];

    const financials = JSON.parse(jsonStr);

    setStatus('', false);
    resultsEl.innerHTML = '';

    financials.forEach((company, idx) => {
      renderCompanyCard(company, idx);
    });

  } catch (err) {
    setStatus('', false);
    resultsEl.innerHTML = '';
    setError('분석 실패: ' + err.message + ' — API 키가 설정되어 있는지 확인하세요.');
    console.error(err);
  }

  btn.disabled = false;
}

function renderCompanyCard(data, idx) {
  const color = COLORS[idx % COLORS.length];
  const years = data.years || [2020,2021,2022,2023,2024];
  const revenue = data.revenue || [];
  const opIncome = data.operating_income || [];
  const opMargin = data.operating_margin || [];
  const netIncome = data.net_income || [];
  const currency = data.currency || 'USD';
  const unit = currency === 'KRW' ? '조원' : 'B USD';

  // Compute stats
  const latestRev = revenue[revenue.length - 1];
  const prevRev = revenue[revenue.length - 2];
  const revGrowth = prevRev ? (((latestRev - prevRev) / prevRev) * 100).toFixed(1) : null;
  const latestMargin = opMargin[opMargin.length - 1];
  const latestNetIncome = netIncome[netIncome.length - 1];

  const growthClass = revGrowth > 0 ? 'up' : 'down';
  const growthSign = revGrowth > 0 ? '+' : '';

  const cardId = `card-${idx}`;
  const chartId = `chart-${idx}`;

  const resultsEl = document.getElementById('results');
  const card = document.createElement('div');
  card.className = 'company-card';
  card.id = cardId;
  card.style.animationDelay = `${idx * 0.1}s`;

  card.innerHTML = `
    <div class="card-header">
      <h2>${data.company} <span class="ticker">${data.ticker || ''}</span></h2>
      <div class="meta-pills">
        <span class="pill purple">${data.sector || 'Technology'}</span>
        <span class="pill">${currency}</span>
        ${data.note ? `<span class="pill" title="${data.note}">est.</span>` : ''}
      </div>
    </div>
    <div class="chart-area">
      <canvas id="${chartId}"></canvas>
    </div>
    <div class="stats-row">
      <div class="stat-cell">
        <div class="label">Latest Revenue</div>
        <div class="value">${latestRev != null ? latestRev.toFixed(1) + ' ' + unit : 'N/A'}</div>
      </div>
      <div class="stat-cell">
        <div class="label">YoY Growth</div>
        <div class="value ${growthClass}">${revGrowth != null ? growthSign + revGrowth + '%' : 'N/A'}</div>
      </div>
      <div class="stat-cell">
        <div class="label">Op. Margin</div>
        <div class="value ${latestMargin > 15 ? 'up' : latestMargin < 5 ? 'down' : ''}">${latestMargin != null ? latestMargin.toFixed(1) + '%' : 'N/A'}</div>
      </div>
      <div class="stat-cell">
        <div class="label">Net Income</div>
        <div class="value">${latestNetIncome != null ? latestNetIncome.toFixed(1) + ' ' + unit : 'N/A'}</div>
      </div>
    </div>
  `;

  resultsEl.appendChild(card);

  // Render chart
  setTimeout(() => {
    const ctx = document.getElementById(chartId).getContext('2d');

    charts[chartId] = new Chart(ctx, {
      data: {
        labels: years,
        datasets: [
          {
            type: 'bar',
            label: `Revenue (${unit})`,
            data: revenue,
            backgroundColor: color.bar,
            borderColor: color.barDark,
            borderWidth: 1,
            yAxisID: 'y',
            order: 2,
          },
          {
            type: 'bar',
            label: `Op. Income (${unit})`,
            data: opIncome,
            backgroundColor: color.barDark,
            borderColor: color.line,
            borderWidth: 1,
            yAxisID: 'y',
            order: 3,
          },
          {
            type: 'line',
            label: 'Op. Margin (%)',
            data: opMargin,
            borderColor: '#fff',
            backgroundColor: 'rgba(255,255,255,0.05)',
            pointBackgroundColor: '#fff',
            pointBorderColor: color.line,
            pointBorderWidth: 2,
            pointRadius: 5,
            pointHoverRadius: 7,
            borderWidth: 2,
            tension: 0.35,
            yAxisID: 'y2',
            order: 1,
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: {
            labels: {
              color: '#7a7a9a',
              font: { family: 'Space Mono', size: 10 },
              boxWidth: 12,
              padding: 16,
            }
          },
          tooltip: {
            backgroundColor: '#1a1a26',
            borderColor: '#2a2a3e',
            borderWidth: 1,
            titleColor: '#e8e8f0',
            bodyColor: '#7a7a9a',
            titleFont: { family: 'Syne', size: 13, weight: '700' },
            bodyFont: { family: 'Space Mono', size: 11 },
            padding: 12,
            callbacks: {
              label: (ctx) => {
                const ds = ctx.dataset;
                const val = ctx.parsed.y;
                if (val == null) return null;
                if (ds.yAxisID === 'y2') return ` Op. Margin: ${val.toFixed(1)}%`;
                return ` ${ds.label}: ${val.toFixed(1)}`;
              }
            }
          }
        },
        scales: {
          x: {
            grid: { color: 'rgba(255,255,255,0.04)' },
            ticks: { color: '#7a7a9a', font: { family: 'Space Mono', size: 11 } }
          },
          y: {
            position: 'left',
            grid: { color: 'rgba(255,255,255,0.04)' },
            ticks: {
              color: '#7a7a9a',
              font: { family: 'Space Mono', size: 10 },
              callback: v => v.toFixed(0)
            },
            title: {
              display: true,
              text: unit,
              color: '#7a7a9a',
              font: { family: 'Space Mono', size: 10 }
            }
          },
          y2: {
            position: 'right',
            grid: { drawOnChartArea: false },
            ticks: {
              color: '#fff',
              font: { family: 'Space Mono', size: 10 },
              callback: v => v.toFixed(1) + '%'
            },
            title: {
              display: true,
              text: 'Op. Margin (%)',
              color: '#fff',
              font: { family: 'Space Mono', size: 10 }
            }
          }
        }
      }
    });
  }, 50);
}
</script>
</body>
</html>
