<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기업 인텔리전스 에이전트</title>
<style>
  :root {
    --gold: #C8A96E;
    --gold-dim: rgba(200,169,110,0.15);
    --gold-border: rgba(200,169,110,0.25);
    --bg: #0e0c09;
    --surface: rgba(255,255,255,0.03);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: #ffffff; font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; font-weight: 400; min-height: 100vh; }
  .wrap { max-width: 900px; margin: 0 auto; padding: 48px 24px 80px; }
  header { margin-bottom: 48px; }
  .header-tag { font-size: 11px; color: #aaa; letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 12px; }
  h1 { font-size: clamp(28px, 5vw, 44px); font-weight: 400; color: var(--gold); letter-spacing: -0.02em; line-height: 1.1; margin-bottom: 10px; }
  .subtitle { font-size: 14px; color: #888; line-height: 1.7; }
  .search-row { display: flex; gap: 10px; margin-bottom: 16px; }
  .input-wrap { flex: 1; display: flex; align-items: center; gap: 12px; background: var(--surface); border: 1px solid var(--gold-border); border-radius: 10px; padding: 0 18px; transition: border-color 0.2s; }
  .input-wrap:focus-within { border-color: var(--gold); }
  .input-wrap input { flex: 1; background: none; border: none; outline: none; font-size: 15px; color: #ffffff; padding: 15px 0; font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; }
  .input-wrap input::placeholder { color: #aaa; }
  .search-icon { font-size: 16px; opacity: 0.6; flex-shrink: 0; }
  button.btn-primary { padding: 15px 28px; border-radius: 10px; border: none; cursor: pointer; background: var(--gold); color: #1a1410; font-size: 14px; font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; transition: all 0.2s; white-space: nowrap; }
  button.btn-primary:hover { background: #d4b87a; }
  button.btn-primary:disabled { background: var(--gold-dim); color: var(--gold); cursor: not-allowed; }
  button.btn-reset { padding: 15px 20px; border-radius: 10px; border: 1px solid var(--gold-border); background: none; color: #aaa; cursor: pointer; font-size: 13px; font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; transition: all 0.2s; }
  button.btn-reset:hover { color: #ffffff; }
  .apikey-wrap { background: rgba(200,169,110,0.04); border: 1px solid rgba(200,169,110,0.15); border-radius: 10px; padding: 16px 20px; margin-bottom: 24px; }
  .apikey-label { font-size: 11px; color: #888; letter-spacing: 0.1em; margin-bottom: 8px; }
  .apikey-row input { width: 100%; background: none; border: 1px solid var(--gold-border); border-radius: 8px; padding: 10px 14px; color: #ffffff; font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; font-size: 13px; outline: none; transition: border-color 0.2s; }
  .apikey-row input::placeholder { color: #aaa; }
  .apikey-row input:focus { border-color: var(--gold); }
  .apikey-note { font-size: 11px; color: #666; margin-top: 8px; line-height: 1.6; }
  .apikey-note a { color: var(--gold); text-decoration: none; }
  .chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 40px; }
  .chip { padding: 7px 14px; border-radius: 20px; border: 1px solid rgba(200,169,110,0.2); background: rgba(200,169,110,0.04); color: #aaa; cursor: pointer; font-size: 13px; font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; transition: all 0.2s; }
  .chip:hover { color: var(--gold); border-color: var(--gold-border); }
  .progress { padding: 40px 0; text-align: center; }
  .progress-stages { display: flex; justify-content: center; gap: 40px; margin-bottom: 28px; }
  .prog-stage { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .prog-dot { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; transition: all 0.4s; }
  .prog-dot.done { background: var(--gold); color: #1a1410; }
  .prog-dot.active { background: var(--gold); color: #1a1410; box-shadow: 0 0 0 6px rgba(200,169,110,0.2); }
  .prog-dot.waiting { background: var(--gold-dim); color: var(--gold); }
  .prog-label { font-size: 11px; color: #666; }
  .prog-label.active { color: var(--gold); }
  .prog-bar-track { width: 200px; height: 2px; background: var(--gold-dim); margin: 0 auto; border-radius: 1px; }
  .prog-bar-fill { height: 100%; background: var(--gold); border-radius: 1px; transition: width 0.6s ease; }
  .result-header { margin-bottom: 28px; padding-bottom: 24px; border-bottom: 1px solid rgba(200,169,110,0.1); }
  .company-name { font-size: clamp(22px, 4vw, 32px); font-weight: 400; color: #ffffff; }
  .ticker-badge { display: inline-block; padding: 4px 12px; background: var(--gold-dim); border: 1px solid var(--gold-border); border-radius: 6px; font-size: 13px; color: var(--gold); letter-spacing: 0.08em; margin-left: 12px; }
  .analysis-date { font-size: 12px; color: #444; margin-top: 6px; }
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
  .card { background: var(--surface); border: 1px solid rgba(200,169,110,0.15); border-radius: 12px; padding: 22px 24px; opacity: 0; transform: translateY(16px); transition: opacity 0.5s ease, transform 0.5s ease; }
  .card.visible { opacity: 1; transform: translateY(0); }
  .card-title { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .card-icon { font-size: 18px; }
  .card-label { font-size: 12px; color: var(--gold); letter-spacing: 0.1em; }
  .card-body { font-size: 14px; line-height: 1.9; color: #ddd; }
  .error { margin-top: 24px; padding: 20px; background: rgba(200,80,60,0.08); border: 1px solid rgba(200,80,60,0.2); border-radius: 10px; color: #e07060; font-size: 14px; line-height: 1.7; }
  .disclaimer { margin-top: 32px; font-size: 11px; color: #333; text-align: center; line-height: 1.7; }
  @media (max-width: 600px) { .cards { grid-template-columns: 1fr; } .search-row { flex-wrap: wrap; } button.btn-primary { width: 100%; } }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="header-tag">AI Agent v1.0</div>
    <h1>기업 인텔리전스</h1>
    <p class="subtitle">기업명을 입력하면 AI가 웹을 검색해 핵심 정보를 요약합니다</p>
  </header>
  <div class="apikey-wrap">
    <div class="apikey-label">ANTHROPIC API KEY</div>
    <div class="apikey-row">
      <input type="password" id="apikey" placeholder="sk-ant-..." autocomplete="off">
    </div>
    <div class="apikey-note">
      API 키는 브라우저 메모리에만 저장되며 어디에도 전송되지 않습니다.<br>
      키가 없다면 <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>에서 발급받으세요.
    </div>
  </div>
  <div class="search-row">
    <div class="input-wrap">
      <span class="search-icon">🔎</span>
      <input type="text" id="query" placeholder="예: SK하이닉스, NVIDIA, 삼성전자..." />
    </div>
    <button class="btn-primary" id="btn-search" onclick="handleSearch()">분석</button>
    <button class="btn-reset" id="btn-reset" style="display:none" onclick="handleReset()">새로 검색</button>
  </div>
  <div class="chips" id="chips">
    <span class="chip" onclick="quickSearch('SK하이닉스')">SK하이닉스</span>
    <span class="chip" onclick="quickSearch('NVIDIA')">NVIDIA</span>
    <span class="chip" onclick="quickSearch('TSMC')">TSMC</span>
    <span class="chip" onclick="quickSearch('삼성전자')">삼성전자</span>
    <span class="chip" onclick="quickSearch('Micron')">Micron</span>
  </div>
  <div class="progress" id="progress" style="display:none">
    <div class="progress-stages">
      <div class="prog-stage"><div class="prog-dot waiting" id="dot-0">1</div><div class="prog-label" id="lbl-0">검색 중</div></div>
      <div class="prog-stage"><div class="prog-dot waiting" id="dot-1">2</div><div class="prog-label" id="lbl-1">분석 중</div></div>
      <div class="prog-stage"><div class="prog-dot waiting" id="dot-2">3</div><div class="prog-label" id="lbl-2">정리 중</div></div>
    </div>
    <div class="prog-bar-track"><div class="prog-bar-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
  <div class="error" id="error" style="display:none"></div>
  <div id="result" style="display:none">
    <div class="result-header">
      <div>
        <span class="company-name" id="res-name"></span>
        <span class="ticker-badge" id="res-ticker" style="display:none"></span>
      </div>
      <div class="analysis-date" id="res-date"></div>
    </div>
    <div class="cards" id="cards"></div>
    <div class="disclaimer">※ AI가 웹 검색으로 수집한 정보입니다. 투자 결정 전 반드시 공식 자료를 확인하세요.</div>
  </div>
</div>
<script>
var SECTIONS = [
  { key: 'overview',    label: '기업 개요',       icon: '🏢' },
  { key: 'financials',  label: '재무 현황',       icon: '📊' },
  { key: 'products',    label: '주요 제품/서비스', icon: '⚙️' },
  { key: 'news',        label: '최신 뉴스',       icon: '📰' },
  { key: 'competitors', label: '경쟁사 분석',     icon: '🔍' },
  { key: 'outlook',     label: '투자 전망',       icon: '📈' }
];

var SYSTEM_SEARCH = '당신은 기업 분석 전문가입니다. 주어진 기업에 대해 웹 검색을 통해 최신 정보를 수집하고 상세히 분석해주세요.';
var SYSTEM_JSON = '당신은 JSON 변환 도구입니다. 입력된 기업 분석 텍스트를 아래 JSON 형식으로만 출력하세요. 절대로 JSON 외 다른 텍스트를 출력하지 마세요. 코드블록도 사용하지 마세요. {"companyName":"기업명","ticker":"티커(없으면null)","overview":"기업개요","financials":"재무현황","products":"주요제품서비스","news":"최신뉴스","competitors":"경쟁사분석","outlook":"투자전망"}';

function setStage(n) {
  for (var i = 0; i < 3; i++) {
    var d = document.getElementById('dot-' + i);
    var l = document.getElementById('lbl-' + i);
    d.className = 'prog-dot ' + (i < n ? 'done' : i === n ? 'active' : 'waiting');
    d.textContent = i < n ? '✓' : String(i + 1);
    l.className = i === n ? 'prog-label active' : 'prog-label';
  }
  document.getElementById('prog-fill').style.width = (n / 2 * 100) + '%';
}

async function callAPI(system, messages, useSearch) {
  var apikey = document.getElementById('apikey').value.trim();
  var body = { model: 'claude-sonnet-4-20250514', max_tokens: 4096, system: system, messages: messages };
  if (useSearch) body.tools = [{ type: 'web_search_20250305', name: 'web_search' }];
  var res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-api-key': apikey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
    body: JSON.stringify(body)
  });
  if (!res.ok) {
    var err = await res.json().catch(function() { return {}; });
    throw new Error((err.error && err.error.message) || ('API 오류: ' + res.status));
  }
  return await res.json();
}

async function handleSearch() {
  var apikey = document.getElementById('apikey').value.trim();
  var query = document.getElementById('query').value.trim();
  if (!apikey) { showError('API 키를 먼저 입력해주세요.'); return; }
  if (!query) { showError('기업명을 입력해주세요.'); return; }

  document.getElementById('btn-search').disabled = true;
  document.getElementById('chips').style.display = 'none';
  document.getElementById('result').style.display = 'none';
  document.getElementById('error').style.display = 'none';
  document.getElementById('progress').style.display = 'block';
  setStage(0);

  try {
    var searchData = await callAPI(SYSTEM_SEARCH, [{ role: 'user', content: '"' + query + '" 기업의 최신 정보를 웹 검색으로 수집하고 분석해주세요. 한국어로 작성하세요.' }], true);
    setStage(1);

    var searchText = '';
    for (var i = 0; i < searchData.content.length; i++) {
      if (searchData.content[i].type === 'text') searchText += searchData.content[i].text + '\n';
    }
    if (!searchText.trim()) throw new Error('검색 결과를 가져오지 못했습니다. 다시 시도해주세요.');

    setStage(2);
    var jsonData = await callAPI(SYSTEM_JSON, [{ role: 'user', content: '다음 내용을 JSON으로 변환:\n' + searchText.substring(0, 3000) }], false);

    var jsonText = '';
    for (var j = 0; j < jsonData.content.length; j++) {
      if (jsonData.content[j].type === 'text') { jsonText = jsonData.content[j].text; break; }
    }
    if (!jsonText) throw new Error('JSON 변환 실패. 다시 시도해주세요.');

    var s = jsonText.indexOf('{');
    var e = jsonText.lastIndexOf('}');
    if (s === -1 || e === -1) throw new Error('JSON을 찾을 수 없습니다. 다시 시도해주세요.');

    var parsed = JSON.parse(jsonText.substring(s, e + 1));
    showResult(parsed);
  } catch(err) {
    showError(err.message || '알 수 없는 오류가 발생했습니다.');
  }
}

function handleReset() {
  document.getElementById('result').style.display = 'none';
  document.getElementById('error').style.display = 'none';
  document.getElementById('chips').style.display = 'flex';
  document.getElementById('btn-reset').style.display = 'none';
  document.getElementById('progress').style.display = 'none';
  document.getElementById('btn-search').disabled = false;
  document.getElementById('query').value = '';
}

function showError(msg) {
  document.getElementById('progress').style.display = 'none';
  document.getElementById('btn-search').disabled = false;
  var el = document.getElementById('error');
  el.textContent = '⚠️ ' + msg;
  el.style.display = 'block';
}

function showResult(data) {
  document.getElementById('progress').style.display = 'none';
  document.getElementById('btn-search').disabled = false;
  document.getElementById('res-name').textContent = data.companyName || '';
  var ticker = document.getElementById('res-ticker');
  if (data.ticker && data.ticker !== 'null') { ticker.textContent = data.ticker; ticker.style.display = 'inline-block'; }
  else ticker.style.display = 'none';
  document.getElementById('res-date').textContent = new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' }) + ' 기준 분석';
  var container = document.getElementById('cards');
  container.innerHTML = '';
  SECTIONS.forEach(function(sec, i) {
    var card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = '<div class="card-title"><span class="card-icon">' + sec.icon + '</span><span class="card-label">' + sec.label + '</span></div><div class="card-body">' + (data[sec.key] || '-') + '</div>';
    container.appendChild(card);
    setTimeout(function(c) { return function() { c.classList.add('visible'); }; }(card), i * 120);
  });
  document.getElementById('result').style.display = 'block';
  document.getElementById('btn-reset').style.display = 'inline-block';
  document.getElementById('chips').style.display = 'none';
}

function quickSearch(name) {
  document.getElementById('query').value = name;
  handleSearch();
}

document.getElementById('query').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') handleSearch();
});
</script>
</body>
</html>
